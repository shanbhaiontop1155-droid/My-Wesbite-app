<!DOCTYPE html>
<html lang="en">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS LEGEND</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:3px solid #3b82f6;
margin-bottom:15px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.main-btn{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
margin-bottom:10px;
font-size:16px;
}

.card{
background:#334155;
padding:12px;
margin-top:8px;
border-radius:10px;
}

.card a{
color:white;
text-decoration:none;
display:block;
}

.page{
display:none;
}

.chat-box{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.chat-messages{
height:250px;
overflow-y:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

.user{
margin-bottom:8px;
color:white;
}

.bot{
margin-bottom:8px;
color:#60a5fa;
}

.chat-input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

.send-btn{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

.clear-btn{
width:100%;
padding:12px;
margin-top:8px;
background:#ef4444;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

.copy-btn{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
background:#16a34a;
color:white;
cursor:pointer;
}

.status{
font-weight:bold;
}

</style>
</head>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"));
}
</script>
<body>

<div class="container">

<img
src="https://files.catbox.moe/gkmrfn.png"
class="logo"
>

<h1>ITS LEGEND</h1>

<div id="homePage">

<button
class="main-btn"
onclick="openPage('socialPage')"
>
📱 Social Media
</button>

<button
class="main-btn"
onclick="openPage('serverPage')"
>
🎮 Minecraft Servers
</button>

<button
class="main-btn"
onclick="openPage('aiPage')"
>
🤖 Legend AI
</button>

</div>

<div
id="socialPage"
class="page"
>

<button
class="main-btn"
onclick="goHome()"
>
⬅ Back
</button>

<h2>📱 Social Media</h2>

<input
type="text"
class="search"
placeholder="Search..."
onkeyup="searchSocial(this.value)"
>

<div id="socialList">

<div class="card social-item">
<a
href="https://www.instagram.com/itslegendddd"
target="_blank"
>
📸 Instagram
</a>
</div>

<div class="card social-item">
<a
href="https://discord.gg/VKhy3f8juK"
target="_blank"
>
💬 Discord
</a>
</div>

<div class="card social-item">
<a
href="https://youtube.com/@itslegenddddd"
target="_blank"
>
▶️ YouTube
</a>
</div>

</div>

</div>

<div
id="serverPage"
class="page"
>

<button
class="main-btn"
onclick="goHome()"
>
⬅ Back
</button>

<h2>🎮 Minecraft Servers</h2>

<input
type="text"
class="search"
placeholder="Search Server..."
onkeyup="searchServer(this.value)"
>

<div id="serverList">

<div class="card server-item">

<h3>OnlyLegendsMC</h3>

<div class="card">
<b>Server Status</b><br>
<span
id="serverStatus"
class="status"
>
Loading...
</span>
</div>

<div class="card">

<b>Java IP</b><br>

OnlyLegendsMC.aternos.me:63710

<button
class="copy-btn"
onclick="copyText('OnlyLegendsMC.aternos.me:63710')"
>
📋 Copy Java IP
</button>

</div>

<div class="card">

<b>Bedrock IP</b><br>

OnlyLegendsMC.aternos.me

<button
class="copy-btn"
onclick="copyText('OnlyLegendsMC.aternos.me')"
>
📋 Copy Bedrock IP
</button>

</div>

<div class="card">

<b>Port</b><br>

63710

<button
class="copy-btn"
onclick="copyText('63710')"
>
📋 Copy Port
</button>

</div>

</div>

</div>

</div>

<div
id="aiPage"
class="page"
>

<button
class="main-btn"
onclick="goHome()"
>
⬅ Back
</button>

<h2>🤖 Legend AI</h2>

<div class="chat-box">

<div
id="chatMessages"
class="chat-messages"
>
</div>

<input
type="text"
id="userInput"
class="chat-input"
placeholder="Type a message..."
>

<button
class="send-btn"
onclick="sendMessage()"
>
Send
</button>

<button
class="clear-btn"
onclick="clearChat()"
>
Clear Chat
</button>

</div>

</div>

</div>

<script>

function openPage(id){

document.getElementById(
"homePage"
).style.display="none";

document
.querySelectorAll(".page")
.forEach(page=>{

page.style.display="none";

});

document
.getElementById(id)
.style.display="block";

}

function goHome(){

document.getElementById(
"homePage"
).style.display="block";

document
.querySelectorAll(".page")
.forEach(page=>{

page.style.display="none";

});

}

function searchSocial(value){

value=value.toLowerCase();

document
.querySelectorAll(".social-item")
.forEach(item=>{

item.style.display=
item.innerText
.toLowerCase()
.includes(value)

? "block"
: "none";

});

}

function searchServer(value){

value=value.toLowerCase();

document
.querySelectorAll(".server-item")
.forEach(item=>{

item.style.display=
item.innerText
.toLowerCase()
.includes(value)

? "block"
: "none";

});

}

function copyText(text){

navigator.clipboard.writeText(text);

alert("✅ Copied: " + text);

}

async function updateServerStatus(){

try{

const response=
await fetch(
"https://api.mcsrvstat.us/2/OnlyLegendsMC.aternos.me:63710"
);

const data=
await response.json();

if(data.online){

document.getElementById(
"serverStatus"
).innerHTML=

"🟢 Online<br>👥 Players: "
+
data.players.online
+
"/"
+
data.players.max;

}else{

document.getElementById(
"serverStatus"
).innerHTML=
"🔴 Offline";

}

}catch(err){

document.getElementById(
"serverStatus"
).innerHTML=
"⚠️ Error Loading";

}

}

function addMessage(text,type){

let chat=
document.getElementById(
"chatMessages"
);

let div=
document.createElement("div");

div.className=type;

div.textContent=text;

chat.appendChild(div);

chat.scrollTop=
chat.scrollHeight;

}

function sendMessage(){

let input=
document.getElementById(
"userInput"
);

let msg=
input.value.trim();

if(msg==="") return;

addMessage(
"🧑 " + msg,
"user"
);

let text=
msg.toLowerCase();

let reply=
"🤖 Sorry, mujhe samajh nahi aaya.";

if(
text.includes("hello") ||
text.includes("hi") ||
text.includes("hey") ||
text.includes("hii")
){

reply=
"🤖 Hello! Welcome to ITS LEGEND.";

}

else if(
text.includes("server") ||
text.includes("ip")
){

reply=
"🎮 OnlyLegendsMC.aternos.me:63710";

}

else if(
text.includes("discord")
){

reply=
"💬 discord.gg/VKhy3f8juK";

}

else if(
text.includes("youtube") ||
text.includes("yt")
){

reply=
"▶️ youtube.com/@itslegenddddd";

}

else if(
text.includes("instagram") ||
text.includes("insta")
){

reply=
"📸 instagram.com/itslegendddd";

}

addMessage(
reply,
"bot"
);

input.value="";

saveChat();

}

function saveChat(){

localStorage.setItem(
"legendAIChat",
document.getElementById(
"chatMessages"
).innerHTML
);

}

function loadChat(){

let saved=
localStorage.getItem(
"legendAIChat"
);

if(saved){

document.getElementById(
"chatMessages"
).innerHTML=
saved;

}else{

document.getElementById(
"chatMessages"
).innerHTML=

'<div class="bot">🤖 Hello! Welcome to ITS LEGEND.</div>';

}

}

function clearChat(){

localStorage.removeItem(
"legendAIChat"
);

document.getElementById(
"chatMessages"
).innerHTML=

'<div class="bot">🤖 Chat Cleared.</div>';

}

document
.getElementById("userInput")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){

sendMessage();

}

}
);

loadChat();

updateServerStatus();

setInterval(
updateServerStatus,
30000
);

</script>

</body>
</html>
